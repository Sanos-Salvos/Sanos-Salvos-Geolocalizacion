spring.application.name=geolocalizacion
server.port=8085

# Si DB_HOST existe (Docker), lo usa. Si no, usa localhost (IntelliJ).
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/geolocalizacion_db
spring.datasource.username=postgres
spring.datasource.password=1234

spring.cloud.config.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.openfeign.client.config.mapa-externo.logger-level=full

# Kafka: Si KAFKA_HOST no existe, usa localhost
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:9092

