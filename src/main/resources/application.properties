spring.application.name=geolocalizacion
server.port=${PORT:8085}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/geolocalizacion_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

spring.cloud.config.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.openfeign.client.config.mapaExterno.logger-level=full

resilience4j.circuitbreaker.instances.mapasCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.mapasCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.mapasCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.mapasCB.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.mapasCB.permitted-number-of-calls-in-half-open-state=2

spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}